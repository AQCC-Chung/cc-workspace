name: Keep Render Alive

on:
  schedule:
    # 每 10 分鐘執行一次（UTC，GitHub Actions 最小間隔 5 分鐘）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.VITE_API_URL }}/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Render backend is alive"
          else
            echo "⚠ Unexpected status: $STATUS"
          fi

      - name: Warm up scan cache (optional)
        # 呼叫一次掃描 endpoint 讓 yfinance cache 保持熱態
        # 使用最常見的 3 檔（輕量），避免 Action 時間過長
        run: |
          curl -s --max-time 60 \
            "${{ vars.VITE_API_URL }}/api/stock/scan?tickers=2330,0050,2317" \
            > /dev/null && echo "✓ Scan cache warmed" || echo "⚠ Scan warmup failed (non-critical)"
